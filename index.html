<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birth Details Onboarding</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBC1DuEPGQMNeanxQ3__ycSsIreVikEWJ0&libraries=places"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--tg-theme-bg-color, #fff); color: var(--tg-theme-text-color, #000); padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: var(--tg-theme-button-color, #248bcf); color: var(--tg-theme-button-text-color, #fff); border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        button:disabled {
            background-color: #a0a0a0 !important;
            cursor: not-allowed;
            opacity: 0.8;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <h3>🌟 შეიყვანეთ თქვენი დეტალები</h3>
    
    <div class="form-group">
        <label for="birthdate">დაბადების თარიღი</label>
        <input type="date" id="birthdate" required>
    </div>

    <div class="form-group">
        <label for="birthtime">დაბადების დრო</label>
        <input type="time" id="birthtime" required>
    </div>

    <div class="form-group">
        <label for="location">დაბადების ქალაქი</label>
        <input type="text" id="location" placeholder="ჩაწერეთ თქვენი დაბადების დაქალაქი..." required>
    </div>

    <button id="submitBtn">ჩემი ნატალური პროფილის შექმნა</button>

    <script>
        // Initialize Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Opens the app to full screen for maximum visibility

        // Initialize Google Places Autocomplete
        const locationInput = document.getElementById('location');
        const autocomplete = new google.maps.places.Autocomplete(locationInput, { types: ['(cities)'] });

       // Handle Submit Button Click
        const submitBtn = document.getElementById('submitBtn');

        submitBtn.addEventListener('click', () => {
            const dateVal = document.getElementById('birthdate').value;
            const timeVal = document.getElementById('birthtime').value;
            const locationVal = locationInput.value;

            if (!dateVal || !timeVal || !locationVal) {
                alert("Please fill out all fields correctly!");
                return;
            }

            const [year, month, day] = dateVal.split('-');
            const [hour, minute] = timeVal.split(':');

            // Secure extraction of verified Telegram User Data
            const userTelegramId = tg.initDataUnsafe?.user?.id;

            if (!userTelegramId) {
                alert("Error authenticating Telegram profile context.");
                return;
            }

            // --- CRITICAL UI LOCKDOWN START ---
            // 1. Freeze the button to completely block multiple clicks
            submitBtn.disabled = true;
            
            // 2. Inject a visual loading indicator and update text for the 20-second wait
            submitBtn.innerHTML = '<div class="spinner"></div> Calculating Your Chart (Up to 20s)...';
            // --- CRITICAL UI LOCKDOWN END ---

            const payload = {
                telegram_chat_id: String(userTelegramId),
                day: parseInt(day, 10),
                month: parseInt(month, 10),
                year: parseInt(year, 10),
                hour: parseInt(hour, 10),
                minute: parseInt(minute, 10),
                location: locationVal
            };

            // Shoot the data out to your n8n Catch Webhook via a POST request
            fetch('https://r2software.app.n8n.cloud/webhook/fb-astro-onboarding', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(() => {
                tg.showPopup({
                    title: 'მონაცემები მიღებულია! ✨',
                    message: 'შენი ასტროლოგიური მონაცემები მუშავდება, მას რამდენიმე წამში მიიღებ!',
                    buttons: [{ id: 'ok', type: 'default', text: 'გახსნა' }]
                }, (buttonId) => {
                    // This function only runs AFTER the button is tapped
                    tg.close(); // Now it safely closes the WebApp overlay panel
                });
            }).catch(err => {
                alert("Submission failed, please try again.");
                
                // RECOVERY: If the server errors out, reactivate the button so they can try again
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'ჩემი ნატალური პროფილის შექმნა';
            });
        });
    </script>
</body>
</html>
